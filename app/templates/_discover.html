<section class="discover-bar">
  <div class="discover-search">
    <p class="discover-line">오늘 바로 써먹을 수 있는 꿀팁을 모아보세요.</p>
    <form class="search-form" method="get" action="/">
      <input name="q" value="{{ q or '' }}" placeholder="제목, 내용, 태그 검색" />
      <button type="submit">검색</button>
    </form>
  </div>

  <div class="tags">
    <a class="tag clear-tag {% if not q %}active-tag{% endif %}" href="/">전체</a>
    {% for tag in tags %}
      <a class="tag {% if q == tag.name %}active-tag{% endif %}" href="/?q={{ tag.name }}">#{{ tag.name }}</a>
    {% endfor %}
  </div>
</section>
