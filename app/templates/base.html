<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>민꿀팁</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-spacer" aria-hidden="true"></div>
    <a class="logo" href="/">
      <span class="logo-mark">M</span>
      <span>민꿀팁</span>
    </a>
    <nav>
      {% if user %}
        <a href="/me">마이페이지</a>
        {% if user.is_admin %}
          <a href="/admin/reports">신고함</a>
          <a href="/admin/inquiries">문의함</a>
        {% endif %}
        <span class="user-chip">{{ user.nickname or user.email }}</span>
        <a class="primary-link" href="/posts/new">글쓰기</a>
        <form action="/logout" method="post" class="inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <button type="submit" class="link-button">로그아웃</button>
        </form>
      {% else %}
        <a class="primary-link" href="/posts/new">글쓰기</a>
        <a class="login-link" href="/login">로그인</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer muted">
    <span>민꿀팁 · 꿀팁 공유 커뮤니티</span>
    <a href="/inquiries/new">문의하기</a>
  </footer>
</body>
</html>
