<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Minggultip</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <a class="logo" href="/">
      <span class="logo-mark">M</span>
      <span>Minggultip</span>
    </a>
    <nav>
      {% if user %}
        <span class="user-chip">{{ user.nickname or user.email }}</span>
        <a class="primary-link" href="/posts/new">글쓰기</a>
        <form action="/logout" method="post" class="inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <button type="submit" class="link-button">로그아웃</button>
        </form>
      {% else %}
        <a href="/login">로그인</a>
        <a class="primary-link" href="/register">회원가입</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer muted">
    Minggultip MVP
  </footer>
</body>
</html>
