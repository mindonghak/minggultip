{% extends "base.html" %}
{% block content %}
  {% include "_discover.html" %}

  <section class="form-panel">
    <div class="section-title">
      <h1>1대1 문의</h1>
      <span class="muted">운영자에게 직접 남기는 문의입니다.</span>
    </div>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/inquiries/new">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>제목</label>
      <input name="subject" maxlength="200" required placeholder="문의 제목을 입력하세요" />
      <label>내용</label>
      <textarea name="message" rows="10" required placeholder="문의 내용을 자세히 적어주세요"></textarea>
      <button type="submit">문의 남기기</button>
    </form>
  </section>
{% endblock %}
