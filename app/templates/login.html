{% extends "base.html" %}
{% block content %}
  <section class="form-panel auth-panel">
    <h1>로그인</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post" autocomplete="off">
      <label for="login_username">아이디</label>
      <input id="login_username" name="username" type="text" required autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="latin" />
      <label for="login_password">비밀번호</label>
      <input id="login_password" name="password" type="password" required autocomplete="current-password" />
      <div class="auth-actions">
        <button type="submit">로그인</button>
        <a class="secondary-action" href="/register">회원가입</a>
      </div>
    </form>
  </section>
{% endblock %}
