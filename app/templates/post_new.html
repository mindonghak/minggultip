{% extends "base.html" %}
{% block content %}
  <h1>글쓰기</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label>제목</label>
    <input name="title" required />
    <label>카테고리</label>
    <input name="category_name" list="cats" required placeholder="새 이름을 입력하면 자동 생성됩니다" />
    <datalist id="cats">
      {% for c in categories %}
        <option value="{{ c.name }}"></option>
      {% endfor %}
    </datalist>
    <label>내용</label>
    <textarea name="content" rows="10" required></textarea>
    <button type="submit">등록</button>
  </form>
{% endblock %}
