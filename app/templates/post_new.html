{% extends "base.html" %}
{% block content %}
  <h1>글쓰기</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>제목</label>
    <input name="title" required />
    <label>카테고리(새로 입력하면 생성됨)</label>
    <input name="category_name" list="cats" required />
    <datalist id="cats">
      {% for c in categories %}
        <option value="{{ c.name }}"></option>
      {% endfor %}
    </datalist>
    <label>내용</label>
    <textarea name="content" rows="10" required></textarea>
    <button type="submit">등록</button>
  </form>
{% endblock %}
