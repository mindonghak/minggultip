{% extends "base.html" %}
{% block content %}
  <section class="form-panel auth-panel">
    <div class="auth-tabs">
      <a class="auth-tab" href="/login">로그인</a>
      <a class="auth-tab active" href="/register">회원가입</a>
    </div>

    <h1>회원가입</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post">
      <label>아이디</label>
      <input name="username" required minlength="3" autocomplete="username" placeholder="영문, 숫자, -, _ 사용" />
      <label>닉네임</label>
      <input name="nickname" maxlength="50" required />
      <label>비밀번호</label>
      <input name="password" type="password" required minlength="4" autocomplete="new-password" />
      <label>복구용 이메일 <span class="optional-label">선택</span></label>
      <input name="recovery_email" type="email" placeholder="비밀번호 찾기 기능을 붙일 때 사용됩니다" />
      <p class="form-help">이메일을 입력하지 않으면 나중에 비밀번호를 찾기 어렵습니다. 지금은 인증 메일을 보내지 않습니다.</p>
      <button type="submit">회원가입</button>
    </form>
  </section>
{% endblock %}
