{% extends "base.html" %}
{% block content %}
  <h1>회원가입</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>이메일</label>
    <input name="email" type="email" required />
    <label>닉네임</label>
    <input name="nickname" maxlength="50" placeholder="비워두면 이메일 앞부분을 사용합니다" />
    <label>비밀번호</label>
    <input name="password" type="password" required />
    <button type="submit">가입</button>
  </form>
{% endblock %}
