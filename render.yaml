services:
  - type: web
    name: minggultip
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: minggultip-db
          property: connectionString

databases:
  - name: minggultip-db
    plan: free
